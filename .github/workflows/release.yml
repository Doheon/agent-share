name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip npm publish, GitHub release, and Homebrew update)'
        type: boolean
        default: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm test

      # Verify tag version matches package.json and CLIENT_VERSION
      - name: Verify versions
        run: |
          PKG=$(node -p "require('./package.json').version")
          CLIENT=$(node -e "const f=require('fs').readFileSync('shared/protocol.ts','utf8');console.log(f.match(/CLIENT_VERSION\s*=\s*\"([^\"]+)\"/)[1])")
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG=${GITHUB_REF_NAME#v}
            if [ "$TAG" != "$PKG" ]; then
              echo "error: tag $TAG != package.json $PKG"; exit 1
            fi
            if [ "$TAG" != "$CLIENT" ]; then
              echo "error: tag $TAG != CLIENT_VERSION $CLIENT"; exit 1
            fi
          else
            if [ "$PKG" != "$CLIENT" ]; then
              echo "error: package.json $PKG != CLIENT_VERSION $CLIENT"; exit 1
            fi
          fi
          echo "VERSION=$PKG" >> $GITHUB_ENV

      # Pack locally to get sha256 before publishing
      - name: Pack and compute sha256
        run: |
          npm pack
          TARBALL=$(ls *.tgz)
          SHA256=$(sha256sum $TARBALL | awk '{print $1}')
          echo "SHA256=$SHA256" >> $GITHUB_ENV
          echo "dry_run: ${{ inputs.dry_run }}"
          echo "version: $VERSION, sha256: $SHA256"

      - name: Publish to npm
        if: ${{ github.event_name == 'push' || !inputs.dry_run }}
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: ${{ github.event_name == 'push' || !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "ash $GITHUB_REF_NAME" \
            --generate-notes

      - name: Update Homebrew formula
        if: ${{ github.event_name == 'push' || !inputs.dry_run }}
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${TAP_TOKEN}@github.com/Doheon/homebrew-tap.git
          cd homebrew-tap
          sed -i "s|url \".*\"|url \"https://registry.npmjs.org/@doheon/ash/-/ash-${VERSION}.tgz\"|" Formula/ash.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/ash.rb
          git config user.email "github-actions@github.com"
          git config user.name "github-actions"
          git add Formula/ash.rb
          git commit -m "chore: update ash to v${VERSION}"
          git push
